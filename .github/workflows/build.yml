name: .NET Build and Test

on: [push, pull_request]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore HistoryTown.slnx

    - name: Build
      run: dotnet build HistoryTown.slnx --no-restore

    - name: Test
      run: dotnet test HistoryTown.slnx --no-build --verbosity normal
